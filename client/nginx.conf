# ─── HTTP → HTTPS Redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name pdflynx.com www.pdflynx.com;

    # ─── Let's Encrypt / Certbot ACME challenge ────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
        allow all;
    }

    # ─── Redirect all HTTP to HTTPS ────────────────────────────────────────────
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS Server ────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name pdflynx.com www.pdflynx.com;
    root /usr/share/nginx/html;
    index index.html;

    # ─── SSL Certificates (Let's Encrypt via Certbot) ─────────────────────────
    ssl_certificate     /etc/letsencrypt/live/pdflynx.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pdflynx.com/privkey.pem;

    # ─── SSL Best Practices ────────────────────────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ─── HSTS (force HTTPS for 1 year) ────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ─── Gzip Compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        application/ld+json
        image/svg+xml
        font/woff
        font/woff2;



    # ─── Security Headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ─── SEO: X-Robots-Tag for non-indexable paths ────────────────────────────
    location ~ ^/(dashboard|settings)/ {
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # ─── SEO: Trailing slash redirect ─────────────────────────────────────────
    rewrite ^(.+)/$ $1 permanent;

    # ─── SEO: Sitemaps & robots.txt (proxy to backend) ────────────────────
    location ~* ^/(sitemap\.xml|sitemap-tools\.xml|sitemap-blog\.xml)$ {
        proxy_pass http://server:5000$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /robots.txt {
        proxy_pass http://server:5000/robots.txt;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "public, max-age=86400";
    }

    # ─── Cache static assets aggressively (JS, CSS, images, fonts) ───────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Vary "Accept-Encoding";
        gzip_static on;
        try_files $uri =404;
    }

    # ─── SPA fallback — serve index.html for client-side routing ─────────────
    # Short cache for index.html to prevent stale SPA shells
    location / {
        try_files $uri $uri.html /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ─── Health check endpoint ────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # ─── Proxy API requests to backend ───────────────────────────────────────
    location /api/ {
        proxy_pass http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 100m;
    }

    # ─── Proxy WebSocket connections ──────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Proxy output file downloads ──────────────────────────────────────────
    location ^~ /outputs/ {
        proxy_pass http://server:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Robots-Tag "noindex, nofollow" always;
    }

    # ─── Deny access to hidden files ──────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ─── Custom error pages ───────────────────────────────────────────────────
    error_page 404 /index.html;
}
