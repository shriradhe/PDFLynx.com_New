services:
  # ── Frontend (React + Vite + Nginx) ────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      cache_from:
        - type=registry,ref=cache:latest
    container_name: pdflynx-client
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - pdflynx-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Backend (Node.js + Express) ────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      cache_from:
        - type=registry,ref=cache:latest
    container_name: pdflynx-server
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/pdflynx
      REDIS_ENABLED: 'true'
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CLIENT_URL: https://pdflynx.com
    env_file:
      - ./server/.env
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pdflynx-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    volumes:
      - pdf_uploads:/app/uploads
      - pdf_outputs:/app/outputs
      - pdf_logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 1G
          cpus: '1'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:latest
    container_name: pdflynx-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: pdflynx
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - pdflynx-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pdflynx-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --loglevel notice
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - pdflynx-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local
  pdf_uploads:
    driver: local
  pdf_outputs:
    driver: local
  pdf_logs:
    driver: local

networks:
  pdflynx-network:
    driver: bridge
