name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ── Server Tests ──
  server-test:
    name: Server - Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/pdflynx-test
          JWT_SECRET: test-secret-key-for-ci
          REDIS_ENABLED: false

  # ── Client Build ──
  client-build:
    name: Client - Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/dist
          retention-days: 7

  # ── Docker Build ──
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [server-test, client-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build server image
        run: docker build -t pdflynx-server:${{ github.sha }} ./server

      - name: Build client image
        run: docker build -t pdflynx-client:${{ github.sha }} ./client

      - name: Test docker-compose
        run: |
          echo "JWT_SECRET=ci-test-secret" > ./server/.env
          echo "MONGO_URI=mongodb://mongo:27017/pdflynx" >> ./server/.env
          echo "REDIS_ENABLED=false" >> ./server/.env
          docker compose config
